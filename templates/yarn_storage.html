<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <title>Yarn Storage</title>
</head>
<body>
    <header class="navbar">

        <h1 class="site-title">Yarn Storage Page</h1>

        <nav>
            <ul class="nav_list">
                <li><a href="/">Home</a></li>
                <li><a href="yarn_storage.html">Yarn Storage</a></li>
                <li><a href="wishlist.html">Wishlist</a></li>
                <li><a href="projects.html">Projects</a></li>
            </ul>
        </nav>

    </header>

    <div>
        <!-- Make the add yarn etc look nicer with css-->

        <h2>Add Yarn</h2>

        <form method="post" enctype="multipart/form-data">
            <input type="text" name="name" placeholder="Enter Yarn Name: ">
            <input type="text" name="type" placeholder="Enter Yarn Type: ">
            <input type="text" name="color" placeholder="Enter Yarn Color: ">
            <input type="file" name="image">

            <button type="submit">Add Yarn</button>
        </form>
    </div>
    <div>
        <h2>List of Yarn</h2>
        <form method="get" action="/yarn_storage.html">

    <label>Sort list by:</label>
    <select name="sort">
        <option value="id" {% if request.args.get('sort') == 'id' %}selected{% endif %}>Default</option>
        <option value="name" {% if request.args.get('sort') == 'name' %}selected{% endif %}>Name</option>
        <option value="type" {% if request.args.get('sort') == 'type' %}selected{% endif %}>Type</option>
        <option value="color" {% if request.args.get('sort') == 'color' %}selected{% endif %}>Color</option>
    </select>

    <label>Direction:</label>
    <select name="direction">
        <option value="asc" {% if request.args.get('direction') == 'asc' %}selected{% endif %}>Ascending</option>
        <option value="desc" {% if request.args.get('direction') == 'desc' %}selected{% endif %}>Descending</option>
    </select>

    <label>Filter By:</label>
    <select name="filter_field">
        <option value="" {% if not request.args.get('filter_field') %}selected{% endif %}>All</option>
        <option value="color" {% if request.args.get('filter_field') == 'color' %}selected{% endif %}>Color</option>
        <option value="type" {% if request.args.get('filter_field') == 'type' %}selected{% endif %}>Type</option>
    </select>

    <label>Value:</label>
    <input type="text" name="filter_value"
           value="{{ request.args.get('filter_value', '') }}"
           placeholder="e.g. blue">

    <button type="submit">Apply</button>
</form>
        <ul class="list-info">
        {% for yarn in yarns %}
            <li>

                <div class="list-details">
                    <span class="label">Name:</span> {{ yarn.y_name }} |
                    <span class="label">Type:</span> {{ yarn.y_type }} |
                    <span class="label">Color:</span> {{ yarn.y_color }} |
                    <span class="label">Image:</span>
                </div>
                
                <img class="list-img"
                        src="{{ url_for('static', filename='uploads/' ~ yarn.y_image) }}"
                        alt="{{ yarn.y_name }}">

                <form method="post" action="{{ url_for('delete_yarn', y_id=yarn.y_id) }}">
                     <button type="submit">Delete</button>
                </form>

            </li>
            {% endfor %}
        </ul>
    </div>  
</body>
</html>
